services:
  frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - internal

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hotdog_showdown
      - DB_USER=hotdog
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - RESET_SECRET=${RESET_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_DB=hotdog_showdown
      - POSTGRES_USER=hotdog
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
      -c max_connections=20
      -c wal_buffers=2MB
      -c checkpoint_timeout=1min
      -c checkpoint_completion_target=0.5
      -c synchronous_commit=on
    shm_size: 128m
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotdog -d hotdog_showdown"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

volumes:
  postgres-data:
    name: hotdog-showdown-postgres-v2
  uploads:
    name: hotdog-showdown-uploads

networks:
  internal:
